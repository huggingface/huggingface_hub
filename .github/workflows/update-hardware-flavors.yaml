name: Update Hardware Flavors

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *" # Every day at 4am

permissions: {}

concurrency:
  group: update-hardware-flavors
  cancel-in-progress: true

jobs:
  pull_request:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.10"

      - name: Setup uv
        run: pip install --upgrade uv

      - name: Install dependencies
        run: uv pip install --system "huggingface_hub[dev] @ ."

      - name: Check and update hardware flavors
        run: python utils/check_hardware_flavors.py --update

      - name: Run style
        run: make style

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create GitHub App token
        if: steps.check_changes.outputs.changed == 'true'
        id: app_token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349  # v2
        with:
          app-id: ${{ secrets.APP_ID_HUGGINGFACE_HUB_BOT }}
          private-key: ${{ secrets.APP_SECRET_PEM_HUGGINGFACE_HUB_BOT }}

      - name: Create Pull Request
        if: steps.check_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0  # v8
        with:
          token: ${{ steps.app_token.outputs.token }}
          commit-message: "Update hardware flavor enums (automated commit)"
          branch: update-hardware-flavors-automated-pr
          delete-branch: true
          title: "[Bot] Update hardware flavor enums"
          body: |
            This PR updates the `SpaceHardware` and/or `JobHardware` enums to match the current Hub API.

            It has been generated by running:
            ```sh
            python utils/check_hardware_flavors.py --update
            make style
            ```

            This PR was automatically created by the [Update Hardware Flavors workflow](https://github.com/huggingface/huggingface_hub/blob/main/.github/workflows/update-hardware-flavors.yaml).

            Make sure the changes are correct before merging.
          labels: |
            automated
          reviewers: |
            Wauplin
