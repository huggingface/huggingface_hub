name: Python prerelease

on:
  push:
    tags:
      - v*rc*
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to test (e.g., 0.30.0rc2)"
        required: true
jobs:
  trigger_rc_testing:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        target-repo: ["transformers", "datasets", "diffusers", "sentence-transformers"]

    steps:
      - name: Determine version from tag
        id: get-version
        env: 
          TAG : ${{ inputs.tag }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Validate tag format: vX.Y.ZrcN
            if [[ ! "$TAG" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+rc[0-9]+$ ]]; then
              echo "Error: Invalid tag format. Expected format: vX.Y.ZrcN or X.Y.ZrcN"
              exit 1
            fi
            echo "VERSION=$TAG" >> $GITHUB_OUTPUT
          else
            VERSION="${GITHUB_REF#refs/tags/}"
            # Validate tag format from git ref
            if [[ ! "$VERSION" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+rc[0-9]+$ ]]; then
              echo "Error: Invalid tag format. Expected format: vX.Y.ZrcN or X.Y.ZrcN"
              exit 1
            fi
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Checkout target repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: huggingface/${{ matrix.target-repo }}
          path: ${{ matrix.target-repo }}
          token: ${{ secrets.HUGGINGFACE_HUB_AUTOMATIC_RC_TESTING }}

      - name: Configure Git
        run: |
          cd ${{ matrix.target-repo }}
          git config user.name "Hugging Face Bot (RC Testing)"
          git config user.email "bot@huggingface.co"

      - name: Wait for prerelease to be out on PyPI
        run: |
          VERSION=${{ steps.get-version.outputs.VERSION }}
          # Validate VERSION format before using with pip
          if [[ ! "$VERSION" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+rc[0-9]+$ ]]; then
            echo "Error: Invalid version format: $VERSION"
            exit 1
          fi
          # Remove 'v' prefix if present for pip
          VERSION_CLEAN="${VERSION#v}"
          echo "Waiting for huggingface-hub==${VERSION_CLEAN} to be available on PyPI"
          while ! pip install "huggingface-hub==${VERSION_CLEAN}"; do
            echo "huggingface-hub==${VERSION_CLEAN} not available yet, retrying in 15s"
            sleep 15
          done

      - name: Create test branch and update dependencies
        id: create-pr
        run: |
          cd ${{ matrix.target-repo }}
          VERSION=${{ steps.get-version.outputs.VERSION }}
          BRANCH_NAME="ci-test-huggingface-hub-${VERSION}-release"

          # Create and checkout new branch
          git checkout -b $BRANCH_NAME

          # Update dependencies using sed - match both >= and == patterns
          if [ -f "setup.py" ]; then
            sed -i -E "s/\"huggingface-hub(>=|==)[^\"]*\"/\"huggingface-hub==${VERSION}\"/" setup.py
            git add setup.py
          fi

          # Only if the target repo is transformers
          if [ "${{ matrix.target-repo }}" = "transformers" ]; then
            sed -i -E "s/\"huggingface-hub(>=|==)[^\"]*\"/\"huggingface-hub==${VERSION}\"/" src/transformers/dependency_versions_table.py
            git add src/transformers/dependency_versions_table.py
          fi

          # Only if the target repo is diffusers
          if [ "${{ matrix.target-repo }}" = "diffusers" ]; then
            sed -i -E "s/\"huggingface-hub\":.*/\"huggingface-hub\": \"huggingface-hub==${VERSION}\",/" src/diffusers/dependency_versions_table.py
            git add src/diffusers/dependency_versions_table.py
          fi

          # Only if the target repo is sentence-transformers
          if [ "${{ matrix.target-repo }}" = "sentence-transformers" ]; then
            sed -i -E "s/\"huggingface-hub(>=|==)[^\"]*\"/\"huggingface-hub==${VERSION}\"/" pyproject.toml
            git add pyproject.toml
          fi

          # Any line with `uv pip install --prerelease=allow` in the `.github/` folder must be updated with `--prerelease=allow` flag
          # WARNING: This modifies CI behavior to allow prerelease packages. Manual review recommended.
          # Only modify workflow files that already reference huggingface-hub to minimize scope
          if grep -r "huggingface-hub" .github/workflows/ >/dev/null 2>&1; then
            find .github/workflows/ -type f -exec grep -l "huggingface-hub" {} \; | xargs sed -i 's/uv pip install /uv pip install --prerelease=allow /g'
            git add .github/workflows/
          fi

          # Commit and push changes
          git --no-pager diff --staged
          git commit -m "Test hfh ${VERSION}"
          git push --set-upstream origin $BRANCH_NAME

      - name: Print URLs for manual check
        run: |
          VERSION=${{ steps.get-version.outputs.VERSION }}
          echo "https://github.com/huggingface/${{ matrix.target-repo }}/actions"
          echo "https://github.com/huggingface/${{ matrix.target-repo }}/compare/main...${BRANCH_NAME}"
