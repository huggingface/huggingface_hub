name: Style Bot

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  style:
    runs-on: ubuntu-latest
    steps:
      - name: Check authorization
        run: |
          AUTHOR_ASSOC="${{ github.event.comment.author_association }}"
          if [[ "$AUTHOR_ASSOC" != "MEMBER" && "$AUTHOR_ASSOC" != "OWNER" && "$AUTHOR_ASSOC" != "COLLABORATOR" ]]; then
            echo "Unauthorized: only org members can trigger this workflow"
            exit 1
          fi

  style-action:
    needs: style
    uses: ./.github/workflows/style-bot-action.yml
    with:
      python_quality_dependencies: "[quality]"
      style_command_type: "style_only"
    secrets:
      app_id: ${{ secrets.HF_BOT_STYLE_APP_ID }}
      app_private_key: ${{ secrets.HF_BOT_STYLE_SECRET_PEM }}
