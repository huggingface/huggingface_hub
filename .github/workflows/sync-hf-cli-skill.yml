name: Sync HF CLI Skill

on:
  push:
    tags:
      - 'v*'
      - '!v*rc*'
  workflow_dispatch:

jobs:
  sync-skill:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout huggingface_hub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e .

      - name: Generate skill docs
        env:
          HF_HOME: /tmp/hf-home
        run: |
          mkdir -p /tmp/hf-cli-skill
          mkdir -p "$HF_HOME" && touch "$HF_HOME/.check_for_update_done"
          hf skills preview > /tmp/hf-cli-skill/SKILL.md

      - name: Determine PR title
        id: pr_title
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            echo "title=Sync HF CLI Skill (${{ github.ref_name }})" >> $GITHUB_OUTPUT
          else
            echo "title=Sync HF CLI Skill (manual trigger)" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID_HUB_SKILLS_REPO }}
          private-key: ${{ secrets.APP_SECRET_PREM_HUB_SKILLS_REPO }}
          repositories: skills

      - name: Checkout skills repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: huggingface/skills
          token: ${{ steps.app_token.outputs.token }}
          path: skills-repo

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Copy generated files
        run: cp /tmp/hf-cli-skill/SKILL.md skills-repo/skills/hf-cli/

      - name: Check for HF CLI skill changes
        id: check_changes
        working-directory: skills-repo
        # git diff returns zero if there is no diff
        run: |
          if git diff --quiet -- skills/hf-cli/SKILL.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No hf-cli skill changes; skipping PR"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump plugin version and regenerate skills repo artifacts
        if: steps.check_changes.outputs.changed == 'true'
        working-directory: skills-repo
        run: |
          uv run scripts/plugin_versions.py bump patch
          ./scripts/publish.sh

      - name: Create Pull Request
        if: steps.check_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app_token.outputs.token }}
          path: skills-repo
          branch: sync/hf-cli-${{ github.run_id }}
          delete-branch: true
          title: ${{ steps.pr_title.outputs.title }}
          reviewers: hanouticelina
          body: |
            Auto-generated from [huggingface_hub@${{ github.sha }}](https://github.com/huggingface/huggingface_hub/commit/${{ github.sha }})

            Triggered by changes to `src/huggingface_hub/cli/`

            ---
            This PR was created automatically by the [sync-hf-cli-skill](https://github.com/huggingface/huggingface_hub/blob/main/.github/workflows/sync-hf-cli-skill.yml) workflow.
          commit-message: "Sync HF CLI skill from huggingface_hub@${{ github.sha }}"
          labels: |
            automated
            cli-sync
