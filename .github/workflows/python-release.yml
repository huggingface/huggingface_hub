name: Python release

on:
  push:
    tags:
      - v*

jobs:
  python_release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install setuptools wheel

      - run: python setup.py sdist bdist_wheel

      - run: |
          pip install twine

      - name: Upload to PyPi
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN_DIST_HUGGINGFACE_HUB }}
        run: |
          twine upload dist/*