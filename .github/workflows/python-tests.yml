name: Python tests

on:
  push:
    branches:
      - main
      - ci_*
    paths-ignore:
      - "docs/**"
  pull_request:
    types: [assigned, opened, synchronize, reopened]
    paths-ignore:
      - "docs/**"

jobs:
  check-imports:
    # Catch missing dependencies: install only base requirements and verify all public imports work.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.14"
      - name: Install base dependencies only
        run: |
          pip install --upgrade uv
          uv venv
          uv pip install .
      - name: Check imports
        run: |
          source .venv/bin/activate
          python -c "from huggingface_hub import *"

  build-ubuntu:
    runs-on:
      group: aws-general-8-plus
    env:
      UV_HTTP_TIMEOUT: 600 # max 10min to install deps

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]
        test_name: ["Everything else", "Inference only", "Xet only"]
        include:
          - python-version: "3.14" # LFS not ran on 3.10
            test_name: "lfs"
          - python-version: "3.10" # test torch~=1.11 on python 3.10 only.
            test_name: "Python 3.10, torch_1.11"
          - python-version: "3.12" # test torch latest on python 3.12 only.
            test_name: "torch_latest"
          - python-version: "3.13" # gradio not supported on 3.14 -> test it on 3.13
            test_name: "gradio"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      # Setup venv
      # TODO: revisit when https://github.com/astral-sh/uv/issues/1526 is addressed.
      - name: Setup venv + uv
        run: |
          pip install --upgrade uv
          uv venv

      # Install dependencies
      - name: Install dependencies
        run: |
          uv pip install "huggingface_hub[testing] @ ."

          case "${{ matrix.test_name }}" in

            "Everything else" | "Inference only")
              sudo apt update
              sudo apt install -y libsndfile1-dev
              ;;

            lfs)
              git config --global user.email "ci@dummy.com"
              git config --global user.name "ci"
              ;;

            gradio)
              uv pip install "huggingface_hub[gradio] @ ."
            ;;

            torch_latest)
              uv pip install "huggingface_hub[torch] @ ."
              uv pip install --upgrade torch
              ;;

            "Python 3.9, torch_1.11")
              uv pip install "huggingface_hub[torch] @ ."
              uv pip install torch~=1.11
              ;;

          esac

          # Xet policy (see `xet_mode` fixture in tests/conftest.py):
          # - "Xet only" job: hf_xet installed. Runs `-m 'not no_xet'` => `xet` tests + unmarked tests with Xet.
          # - all other jobs: hf_xet uninstalled. Run `-m 'not xet'` => `no_xet` tests + unmarked tests without Xet.
          # Unmarked tests therefore run both with and without Xet and must work regardless.
          if [[ "${{ matrix.test_name }}" != "Xet only" ]]; then
            uv pip uninstall hf_xet
          fi

      # Run tests
      - name: Run tests
        working-directory: ./src # For code coverage to work
        run: |
          source ../.venv/bin/activate
          PYTEST="python -m pytest --cov=./huggingface_hub --cov-report=xml:../coverage.xml --vcr-record=none --reruns 8 --reruns-delay 2 --only-rerun '(OSError|Timeout|HTTPError.*502|HTTPError.*504|not less than or equal to 0.01)'"

          case "${{ matrix.test_name }}" in

            "Inference only")
              # Run inference tests concurrently
              PYTEST="$PYTEST ../tests -k 'test_inference' -n 4"
              echo $PYTEST
              eval $PYTEST
            ;;

            "Everything else")
              PYTEST="$PYTEST ../tests -m 'not xet' -k 'not test_inference' -n 4"
              echo $PYTEST
              eval $PYTEST
            ;;

            lfs)
              eval "RUN_GIT_LFS_TESTS=1 $PYTEST ../tests -k 'HfLargefilesTest'"
            ;;

            gradio)
              eval "$PYTEST ../tests/test_webhooks_server.py"
            ;;

            "Python 3.10, torch_1.11" | torch_latest)
            eval "$PYTEST ../tests/test_hub_mixin*"
            eval "$PYTEST ../tests/test_serialization.py"
            ;;

            "Xet only")
              # `xet` tests + unmarked tests, all with hf_xet installed.
              # Inference tests are excluded: they have their own job and don't depend on Xet.
              PYTEST="$PYTEST ../tests -m 'not no_xet' -k 'not test_inference' -n 4"
              echo $PYTEST
              eval $PYTEST
            ;;

          esac

      # Upload code coverage
      - name: Upload coverage reports to Codecov with GitHub Action
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354  # v6.0.1
        with:
          files: ./coverage.xml
          verbose: true

  build-windows:
    # (almost) Duplicate config compared to `build-ubuntu` but running on Windows.
    # Please make sure to keep it updated as well.
    runs-on: windows-latest
    env:
      DISABLE_SYMLINKS_IN_WINDOWS_TESTS: 1
      UV_HTTP_TIMEOUT: 600 # max 10min to install deps
      GIT_CLONE_PROTECTION_ACTIVE: false # See https://github.com/git-lfs/git-lfs/issues/5754
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]
        test_name: ["Everything else", "Xet only"]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      # Setup venv
      # TODO: revisit when https://github.com/astral-sh/uv/issues/1526 is addressed.
      - name: Setup venv + uv
        run: |
          pip install --upgrade uv
          uv venv

      # Install dependencies
      - name: Install dependencies
        run: |
          uv pip install "huggingface_hub[testing] @ ."
          if ("${{ matrix.test_name }}" -eq "Xet only") {
            uv pip install hf_xet
          }

      # Run tests
      - name: Run tests
        working-directory: ./src # For code coverage to work
        run: |
          ..\.venv\Scripts\activate
          $PYTEST_ARGS = @(
            "-m", "pytest",
            "-n", "4",
            "--cov=./huggingface_hub",
            "--cov-report=xml:../coverage.xml",
            "--vcr-record=none",
            "--reruns", "8",
            "--reruns-delay", "2",
            "--only-rerun", "(OSError|Timeout|HTTPError.*502|HTTPError.*504|not less than or equal to 0.01)",
            "../tests"
          )

          switch ("${{ matrix.test_name }}") {
            "Xet only" {
              # `xet` tests + unmarked tests, all with hf_xet installed.
              # Inference tests already run in "Everything else" and don't depend on Xet.
              python $PYTEST_ARGS -m "not no_xet" -k "not test_inference"
            }
            "Everything else" {
              python $PYTEST_ARGS -m "not xet"
            }
          }

      # Upload code coverage
      - name: Upload coverage reports to Codecov with GitHub Action
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354  # v6.0.1
        with:
          files: ./coverage.xml
          verbose: true
